version: "3.8"

services:
  postgres:
    image: pgvector/pgvector:pg15
    container_name: plano_cv_postgres
    environment:
      POSTGRES_DB: plano_cv
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - plano_cv_pgdata:/var/lib/postgresql/data

volumes:
  plano_cv_pgdata: